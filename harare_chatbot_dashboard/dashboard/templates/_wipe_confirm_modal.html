<div id="wipeModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3 style="color:#e74c3c;">⚠️ Confirm Wipe</h3>
            <button class="close-btn" onclick="closeModal('wipeModal')">&times;</button>
        </div>
        <p id="wipeScopeText">You are about to perform a <strong>full wipe</strong> of the knowledge base.</p>
        <p>This action cannot be undone. A backup will be created automatically.</p>
        <div class="form-group">
            <label>Justification <span class="required">*</span> (min 20 characters)</label>
            <textarea id="wipeJustification" rows="3" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="backupConfirm"> I confirm an automatic backup was created</label>
        </div>
        <div class="form-group">
            <label>Type "CONFIRM WIPE" to proceed:</label>
            <input type="text" id="wipeConfirmText" class="form-control">
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeModal('wipeModal')">Cancel</button>
            <button type="button" class="btn btn-danger" id="executeWipe">WIPE KNOWLEDGE BASE</button>
        </div>
    </div>
</div>
