<div id="addContentTypesModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 450px;">
        <div class="modal-header">
            <h3>➕ Add Content Types to <span id="addContentTypesService"></span></h3>
            <button class="close-btn" onclick="closeModal('addContentTypesModal')">&times;</button>
        </div>
        <div id="contentTypesList" class="checkbox-group" style="margin: 1rem 0; max-height: 300px; overflow-y: auto;">
            <!-- Checkboxes populated by JS -->
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelAddContentTypes">Cancel</button>
            <button type="button" class="btn btn-primary" id="addContentTypesBtn">Add</button>
        </div>
    </div>
</div>
