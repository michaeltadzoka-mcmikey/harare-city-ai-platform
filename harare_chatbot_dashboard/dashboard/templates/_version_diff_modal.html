<div id="versionDiffModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 900px;">
        <div class="modal-header">
            <h3>📝 Version Comparison</h3>
            <button class="close-btn">&times;</button>
        </div>
        <div class="modal-body" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
                <h4>Version <span id="diffVersion1"></span></h4>
                <pre id="diffContent1" style="background: #f5f5f5; padding: 1rem; overflow: auto; max-height: 400px; white-space: pre-wrap;"></pre>
            </div>
            <div>
                <h4>Version <span id="diffVersion2"></span></h4>
                <pre id="diffContent2" style="background: #f5f5f5; padding: 1rem; overflow: auto; max-height: 400px; white-space: pre-wrap;"></pre>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary close-btn">Close</button>
        </div>
    </div>
</div>
