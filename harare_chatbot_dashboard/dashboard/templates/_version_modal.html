<div id="versionModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3>📄 Create New Version</h3>
            <button class="close-btn" onclick="closeModal('versionModal')">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="versionDocId">
            <div class="form-group">
                <label>Valid From</label>
                <input type="date" id="versionValidFrom" class="form-control" value="{{ now().date().isoformat() }}">
            </div>
            <div class="form-group">
                <label>Valid To (optional)</label>
                <input type="date" id="versionValidTo" class="form-control">
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelVersion">Cancel</button>
            <button type="button" class="btn btn-primary" id="createVersion">Create Version</button>
        </div>
    </div>
</div>
