<div id="bulkRestoreModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3>♻️ Bulk Restore Documents</h3>
            <button type="button" class="close-btn" onclick="closeModal('bulkRestoreModal')">&times;</button>
        </div>
        <p>Restoring <span id="bulkRestoreCount"></span> archived documents.</p>
        <div class="form-group">
            <label>Valid From:</label>
            <input type="date" id="bulkRestoreValidFrom" class="form-control">
        </div>
        <div class="form-group">
            <label>Valid To (optional):</label>
            <input type="date" id="bulkRestoreValidTo" class="form-control">
        </div>
        <div class="form-group">
            <label>Restore as:</label>
            <div class="radio-group">
                <label><input type="radio" name="bulkRestoreMode" value="draft" checked> Draft (requires manual ingest)</label>
                <label><input type="radio" name="bulkRestoreMode" value="ingest"> Ingest immediately</label>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeModal('bulkRestoreModal')">Cancel</button>
            <button type="button" class="btn btn-primary" id="executeBulkRestore">Restore</button>
        </div>
    </div>
</div>
