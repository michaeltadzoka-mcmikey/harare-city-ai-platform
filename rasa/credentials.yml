# ---------------------------------------------------------------------------
# Harare City Council – RASA Channel Credentials
# Spec: Unified System Doc v3.2 §2.1
#       Channels: Web / WhatsApp / SMS / USSD / IVR / Kiosk
#
# The LLM Gateway is the primary citizen-facing entry point.
# RASA only receives messages that the Gateway has already classified
# as report_intent and forwarded. The REST channel below handles
# that Gateway → RASA webhook call.
#
# WhatsApp (via Twilio) and other channels are listed for reference;
# uncomment and populate credentials when enabling direct channels.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# REST channel – used by the LLM Gateway webhook forward
# No configuration required; the endpoint is /webhooks/rest/webhook
# ---------------------------------------------------------------------------
rest:

  # Increase timeout to 30 seconds
  response_timeout: 30
# ---------------------------------------------------------------------------
# Twilio / WhatsApp (uncomment when enabling)
# ---------------------------------------------------------------------------
# twilio:
#   account_sid: ${TWILIO_ACCOUNT_SID}
#   auth_token:  ${TWILIO_AUTH_TOKEN}
#   twilio_number: ${TWILIO_NUMBER}

# ---------------------------------------------------------------------------
# Facebook Messenger (uncomment when enabling)
# ---------------------------------------------------------------------------
# facebook:
#   verify:       ${FB_VERIFY_TOKEN}
#   secret:       ${FB_APP_SECRET}
#   page-access-token: ${FB_PAGE_ACCESS_TOKEN}

# ---------------------------------------------------------------------------
# Socket.IO – for web/kiosk real-time connections (uncomment when enabling)
# ---------------------------------------------------------------------------
# socketio:
#   user_message_evt: user_uttered
#   bot_message_evt:  bot_uttered
#   session_persistence: true